name: typescript-node-with-playwright
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 2' # Every Tuesday at midnight

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/typescript-node-with-playwright

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner (txt report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          output: trivy-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          
      - name: Upload Trivy report (txt)
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report-table
          path: trivy-report.txt

      - name: Run Trivy vulnerability scanner (json report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy report (json)
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report-json
          path: trivy-report.json
