name: typescript-node-with-playwright
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 2' # Every Tuesday at midnight

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/typescript-node-with-playwright

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=4,enable={{is_default_branch}}
            type=raw,value=4-24,enable={{is_default_branch}}

      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install ORAS
        uses: oras-project/setup-oras@v2

      - name: Run Trivy vulnerability scanner (txt report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: table
          output: trivy-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy report (txt)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-report-table
          path: trivy-report.txt

      - name: Run Trivy vulnerability scanner (json report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy report (json)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-report-json
          path: trivy-report.json

      - name: Attach Trivy JSON as OCI artifact
        run: |
          oras attach "${IMAGE_NAME}@${{ steps.push.outputs.digest }}" \
            --artifact-type application/vnd.aquasec.trivy.report.v1+json \
            trivy-report.json:application/json
