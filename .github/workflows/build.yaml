name: typescript-node-with-playwright
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 2' # Every Tuesday at midnight

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/typescript-node-with-playwright
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=4,enable={{is_default_branch}}
            type=raw,value=4-24,enable={{is_default_branch}}
            
      - uses: docker/build-push-action@v7
        with:
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
